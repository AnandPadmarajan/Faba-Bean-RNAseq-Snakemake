name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniforge (conda + mamba)
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: snakemake
          channels: conda-forge,bioconda

      - name: Cache conda environments
        uses: actions/cache@v4
        with:
          path: ~/.snakemake/conda
          key: ${{ runner.os }}-snakemake-envs-${{ hashFiles('envs/*.yaml') }}

      - name: Install Snakemake
        run: mamba install -n snakemake -c conda-forge -c bioconda snakemake-minimal pandas -y

      - name: Fetch test dataset
        run: bash scripts/fetch_test_data.sh

      - name: Dry-run pipeline (validate DAG)
        run: snakemake -n -p

      - name: Run pipeline end-to-end
        run: snakemake --cores 2 --use-conda --conda-frontend mamba

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results
          path: results/
          if-no-files-found: warn
          retention-days: 7
